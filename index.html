<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gen Downloader - Premium Multi-Platform Video Downloader</title>
    
    <!-- Meta Tags SEO -->
    <meta name="description" content="Gen Downloader - Layanan gratis untuk download video TikTok tanpa watermark, Facebook, Instagram, dan platform lainnya dengan cepat dan mudah.">
    <meta name="keywords" content="download tiktok, tiktok downloader, download video fb, gen downloader, tanpa watermark, download instagram">
    <meta name="robots" content="index, follow">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden; /* Mengunci geser horizontal */
        }
        body { 
            background: #020617; 
            color: #f8fafc; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* --- BACKGROUND CANVAS PARTIKEL --- */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Biar tidak mengganggu klik di web */
        }

        /* Ambient Glow Penyeimbang */
        .bg-glow-static {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
            pointer-events: none;
        }

        /* Header Navbar */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #3b82f6;
        }

        /* Main Container */
        main {
            flex: 1;
            width: 100%;
            max-width: 800px;
            padding: 60px 20px 40px 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        h1 span {
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        /* Input Form Card (Glassmorphism) */
        .search-container {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 16px;
            display: flex;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            width: 100%;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-container:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.15);
        }
        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 18px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }
        .search-container input::placeholder {
            color: #64748b;
        }
        .search-container button {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-container button:hover {
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .search-container button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        /* Loader Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #status {
            margin-bottom: 50px;
        }
        .dl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .dl-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.4);
        }

        /* Platform Grid Section */
        .platform-section {
            margin-top: 20px;
            width: 100%;
        }
        .platform-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            margin-bottom: 25px;
            font-weight: 700;
        }
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
        }
        .platform-link {
            text-decoration: none;
            display: block;
            width: 100%;
        }
        .platform-card {
            background: rgba(30, 41, 59, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.3s;
        }
        .platform-card:hover {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .platform-card svg {
            width: 32px;
            height: 32px;
            transition: transform 0.3s ease;
        }
        .platform-card:hover svg {
            transform: scale(1.1);
        }
        .platform-card span {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
            transition: color 0.3s;
        }
        .platform-card:hover span {
            color: #ffffff;
        }

        /* Responsive Breakpoints (Mobile HP) */
        @media (max-width: 640px) {
            h1 { font-size: 32px; }
            .tagline { font-size: 14px; }
            
            .search-container { 
                flex-direction: column; 
                background: transparent; 
                box-shadow: none; 
                padding: 0; 
                gap: 12px;
                border: none;
                width: 100%;
            }
            
            .search-container:focus-within {
                border-color: transparent;
                box-shadow: none;
            }

            .search-container input { 
                background: rgba(30, 41, 59, 0.5); 
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.08); 
                border-radius: 12px; 
                width: 100%;
                box-sizing: border-box;
                outline: none;
            }
            
            .search-container input:focus {
                border-color: #3b82f6;
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            }

            .search-container button { 
                width: 100%; 
                padding: 14px 0; 
                justify-content: center; 
                border-radius: 12px;
                box-sizing: border-box;
            }
            .platform-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <!-- HTML5 Canvas untuk Partikel Terhubung -->

    <main>

    <script>
        /* --- ENGINE SCRIPT PARTIKEL TERHUBUNG (CANVAS) --- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        // Kurangi jumlah partikel di mobile biar enteng
        const numberOfParticles = window.innerWidth < 640 ? 40 : 85; 

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1; // Ukuran partikel titik
                this.speedX = (Math.random() * 0.4) - 0.2; // Kecepatan gerak X lambat & halus
                this.speedY = (Math.random() * 0.4) - 0.2; // Kecepatan gerak Y lambat & halus
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Memantul jika menabrak batas layar
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = 'rgba(59, 130, 246, 0.5)'; // Warna partikel biru neon transparan
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Fungsi menghubungkan antar partikel dengan garis tipis jika jaraknya dekat
        function connect() {
            let opacityValue = 1;
            // Jarak maksimal garis terhubung (lebih pendek di mobile agar rapi)
            const maxDistance = window.innerWidth < 640 ? 70 : 110; 

            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        opacityValue = 1 - (distance / maxDistance);
                        ctx.strokeStyle = `rgba(59, 130, 246, ${opacityValue * 0.15})`; // Garis biru tipis
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        init();
        animate();


        /* --- SCRIPT FUNGSI DOWNLOAD --- */
        async function downloadVideo() {
            const urlInput = document.getElementById('url').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('btnDownload');
            const spinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');

            if (!urlInput) {
                alert('Masukkan link-nya dulu bos!');
                return;
            }

            btn.disabled = true;
            spinner.style.display = "block";
            btnText.innerText = "Proses...";
            status.innerHTML = "";

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const result = await res.json();

                if (result.success && result.videoUrl) {
                    status.innerHTML = `
                        <p style="color: #4ade80; font-weight: bold; margin-top: 25px; margin-bottom: 12px;">Video Siap Diunduh!</p>
                        <a href="${result.videoUrl}" download="Gen_Video.mp4" target="_blank" class="dl-btn">
                            KLIK UNTUK SIMPAN VIDEO
                        </a>
                    `;
                } else {
                    status.innerHTML = `<p style="color: #ef4444; margin-top: 25px;">${result.error || "Gagal mengekstrak link video. Coba link yang lain."}</p>`;
                }

            } catch (e) {
                status.innerHTML = `<p style="color: #ef4444; margin-top: 25px;">Terjadi kesalahan koneksi ke server API.</p>`;
                console.error(e);
            } finally {
                btn.disabled = false;
                spinner.style.display = "none";
                btnText.innerText = "Unduh";
            }
        }
    </script>
