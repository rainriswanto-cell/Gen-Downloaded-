<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Downloader</title>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
        }
        .box { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 6px; 
            border: 1px solid #334155; 
            background: #0f172a;
            color: white;
            box-sizing: border-box; 
        }
        button { 
            background: #3b82f6; 
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 6px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .dl-btn {
            display: inline-block;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 15px;
            width: 90%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Gen Downloader</h2>
    <p style="color: #94a3b8; font-size: 14px;">Download Video TikTok & FB Langsung</p>
    <input type="text" id="url" placeholder="Tempel link TikTok atau FB di sini...">
    <button id="btnDownload" onclick="downloadVideo()">Proses Video</button>
    <div id="status" style="margin-top:20px; font-size: 14px; color: #cbd5e1;"></div>
</div>

<script>
    async function downloadVideo() {
        const urlInput = document.getElementById('url').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnDownload');

        if (!urlInput) {
            alert('Masukkan link-nya dulu bos!');
            return;
        }

        btn.disabled = true;
        status.innerHTML = "Memproses video, tunggu sebentar...";

        try {
            // Sekarang kita arahkan ke serverless function milik kita di Vercel
            // Kita kirim lewat metode POST agar aman
            const res = await fetch('/api/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ url: urlInput })
            });
            
            const result = await res.json();

            if (result.success && result.videoUrl) {
                status.innerHTML = `
                    <p style="color: #4ade80; font-weight: bold;">Video Berhasil Ditemukan!</p>
                    <a href="${result.videoUrl}" download="Video_Unduhan.mp4" target="_blank" class="dl-btn">
                        KLIK & TAHAN LALU SIMPAN VIDEO
                    </a>
                    <p style="font-size: 11px; color: #94a3b8; margin-top: 8px;">
                        *Catatan HP: Jika video malah terputar, klik ikon titik tiga (⋮) di pojok bawah video lalu pilih <b>Download</b>.
                    </p>
                `;
            } else {
                status.innerText = result.error || "Gagal memproses link. Coba link yang lain.";
            }

        } catch (e) {
            status.innerText = "Terjadi kesalahan koneksi ke server API.";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</script>
</body>
</html>
